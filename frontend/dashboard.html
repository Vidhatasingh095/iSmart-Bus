<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusTrack AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f3f4f9; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .status-badge { background: rgba(79, 70, 229, 0.1); color: #4f46e5; border: 1px solid rgba(79, 70, 229, 0.2); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-bus-alt"></i>
            </div>
            <span class="text-xl font-black text-slate-800 tracking-tighter italic">Local Bus <span class="text-indigo-600">Tracking</span></span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p id="user-display-name" class="text-sm font-black text-slate-800 leading-none">Loading...</p>
                <p id="user-display-role" class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mt-1">Role</p>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-red-50 hover:text-red-500 transition-all">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <main class="p-6 max-w-7xl mx-auto space-y-6">
        
        <div class="glass-card p-8 rounded-[2.5rem] shadow-xl flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight">Welcome back, <span id="welcome-name" class="text-indigo-600">User</span>! 👋</h2>
                <p class="text-slate-500 font-medium mt-1">Here's what's happening with your transport today.</p>
            </div>
            <div class="flex gap-3">
                <div class="glass-card px-6 py-3 rounded-2xl text-center shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Buses</p>
                    <p class="text-xl font-black text-slate-800">12</p>
                </div>
                <div class="glass-card px-6 py-3 rounded-2xl text-center shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">System Status</p>
                    <p class="text-sm font-black text-green-500 uppercase">Live</p>
                </div>
            </div>
        </div>

        <div id="student-view" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 glass-card rounded-[2.5rem] overflow-hidden min-h-[400px] relative">
                <div class="absolute inset-0 bg-slate-200 flex items-center justify-center">
                    <div class="text-center">
                        <i class="fas fa-map-marked-alt text-5xl text-slate-400 mb-3"></i>
                        <p class="font-bold text-slate-500">Live Map Coming Soon...</p>
                    </div>
                </div>
            </div>
            <div class="glass-card p-6 rounded-[2.5rem] space-y-4">
                <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Your Assigned Bus</h3>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Bus Number</p>
                    <p class="text-lg font-black text-slate-800">MH-12-AS-9988</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Estimated Arrival</p>
                    <p class="text-lg font-black text-indigo-600">08:45 AM</p>
                </div>
                <button class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-100">Notify Driver</button>
            </div>
        </div>

        <div id="admin-view" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-card p-6 rounded-3xl text-center">
                    <i class="fas fa-users text-indigo-600 text-2xl mb-2"></i>
                    <p class="text-2xl font-black text-slate-800">1,240</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Students</p>
                </div>
                </div>
        </div>

    </main>

    <script>
        // Check Authentication on Load
        window.onload = function() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');
            const name = localStorage.getItem('userName');

            if (!token) {
                window.location.href = 'index.html'; // Agar login nahi hai toh wapas bhej do
                return;
            }

            // Update UI with Real Data
            document.getElementById('user-display-name').innerText = name;
            document.getElementById('welcome-name').innerText = name;
            document.getElementById('user-display-role').innerText = role;

            // Show Role-Specific View
            if (role === 'student') {
                document.getElementById('student-view').classList.remove('hidden');
            } else if (role === 'admin') {
                document.getElementById('admin-view').classList.remove('hidden');
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
