<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Bus Track | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f3f4f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .tab-active { background: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .input-focus:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl shadow-xl text-white mb-3">
                <i class="fas fa-bus-alt text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tighter italic">Local Bus <span class="text-indigo-600">Tracking</span></h1>
            <p class="text-slate-400 text-[9px] font-bold uppercase tracking-[0.2em]">Premium Transport Portal</p>
        </div>

        <div class="glass-card p-1 rounded-2xl flex mb-6 shadow-sm">
            <button onclick="switchRole('student')" id="btn-student" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all tab-active">Student</button>
            <button onclick="switchRole('admin')" id="btn-admin" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all text-slate-500">Admin</button>
            <button onclick="switchRole('driver')" id="btn-driver" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all text-slate-500">Driver</button>
        </div>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl">
            <div class="flex gap-6 mb-8 border-b border-slate-100">
                <button onclick="toggleForm('login')" id="tab-login" class="pb-3 text-xs font-black border-b-2 border-indigo-600 text-indigo-600 uppercase tracking-widest transition-all">Login</button>
                <button onclick="toggleForm('signup')" id="tab-signup" class="pb-3 text-xs font-black border-b-2 border-transparent text-slate-400 uppercase tracking-widest transition-all">Sign Up</button>
            </div>

            <form id="login-form" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Email / Mobile</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-4 text-slate-300"></i>
                        <input type="text" id="login-email" placeholder="Enter credentials" class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm input-focus" required>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-4 text-slate-300"></i>
                        <input type="password" id="login-password" placeholder="••••••••" class="w-full pl-11 pr-11 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm input-focus" required>
                        <i class="fas fa-eye absolute right-4 top-4 text-slate-300 cursor-pointer password-toggle"></i>
                    </div>
                </div>
                <div class="flex justify-between items-center text-[10px] px-1 font-bold">
                    <label class="flex items-center gap-2 text-slate-500 cursor-pointer"><input type="checkbox" class="accent-indigo-600"> Remember me</label>
                    <a href="#" onclick="handleForgotPassword()" class="text-indigo-600 italic">Forgot Password?</a>
                    
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black text-sm uppercase shadow-xl hover:bg-indigo-700 transition-all active:scale-95">Access Portal <i class="fas fa-arrow-right ml-2 text-xs"></i></button>
            </form>

            <form id="signup-form" class="space-y-4 hidden">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm input-focus" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" id="signup-email" placeholder="john@example.com" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm input-focus" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Mobile Number</label>
                    <div class="flex gap-2">
                        <input type="tel" id="signup-mobile" placeholder="+91 00000 00000" class="flex-1 px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm input-focus" required>
                        <button type="button" onclick="sendOTP()" class="bg-indigo-50 text-indigo-600 px-3 rounded-xl text-[9px] font-black uppercase border border-indigo-100 hover:bg-indigo-600 hover:text-white transition">Get OTP</button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Verify OTP</label>
                    <input type="text" id="signup-otp" placeholder="6-digit code" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm input-focus text-center tracking-[0.5em] font-bold" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Create Password</label>
                    <div class="relative">
                        <input type="password" id="signup-password" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm input-focus" required>
                        <i class="fas fa-eye absolute right-4 top-4 text-slate-300 cursor-pointer password-toggle"></i>
                    </div>
                </div>
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black text-sm uppercase shadow-xl hover:bg-indigo-700 transition-all">Create Portal <i class="fas fa-check-circle ml-2"></i></button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
